{% extends 'core/base.html' %}

{% block title %}Table Reservation · North Gate Resort{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="h2"><i class="fa-solid fa-calendar-check me-2"></i>Reserve a Table</h1>
    <p>Book a table for dinners or events and let us prepare a memorable dining experience.</p>
</div>
<div class="content-panel form-card" style="padding:2.5rem;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary" style="margin-top:1.5rem;">Reserve</button>
    </form>
</div>
{% endblock %}
